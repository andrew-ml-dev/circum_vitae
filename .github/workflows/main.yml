name: Build CV PDF

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Install LaTeX
        run: sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-latex-extra

      - name: Create output folder
        run: mkdir -p output

      - name: Convert Markdown to PDF
        run: pandoc README.md -o output/cv.pdf --pdf-engine=lualatex -V geometry:margin=1in -V fontsize=11pt

      - name: Commit PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/cv.pdf
          git commit -m "auto: update cv pdf" || echo "no changes"
          git push
